<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="./output.css" />
</head>

<body class="bg-background text-white font-grotesk">
  <header class="flex px-8 py-3 justify-between border-b border-solid border-text-primary">
    <div id="logo" class="flex items-center gap-2">
      <div id="logo-img" class="size-4 bg-white"></div>
      <h2 class="m-0">Dibitech</h2>
    </div>
    <button class="min-w-21 max-w-120 px-4 bg-primary rounded-full h-10 font-bold text-sm">Login</button>
  </header>
  <main>
    <section id="hero" class="p-8">
      <div id="hero-container"
        class="relative flex flex-col justify-center overflow-hidden rounded-3xl h-120 w-full gap-1.5 pt-35 px-4">
        <div id="hero-image" class="absolute inset-0 bg-cover bg-center opacity-60"
          style="background-image: url('./assets/images/tower.png');"></div>
        <div id="hero-overlay" class="absolute inset-0 bg-linear-to-r from-black/10 to-black/40"></div>
        <div id="hero-content" class="relative z-10">
          <h1 class="text-3xl text-center font-bold text-white">
            Discover the Future of Work with AI
          </h1>
          <p class="text-center text-[10px] text-white">
            Explore a curated marketplace of AI-powered tools designed to transform your
            workflow and unlock new possibilities.
          </p>
        </div>
      </div>
    </section>
    <section id="category"></section>
  </main>
</body>

</html>
